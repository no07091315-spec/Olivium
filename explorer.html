<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Olivium Explorer</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
<div class="logo">OLIVIUM</div>
<nav>
<a href="index.html">Home</a>
<a href="buy.html">Buy</a>
<a href="explorer.html">Explorer</a>
<a href="tokenomics.html">Tokenomics</a>
</nav>
</header>

<section class="section" id="explorer">
<h2>Olivium Explorer</h2>
<p>Price: <span id="exp-price">Loading...</span></p>
<p>Marketcap: <span id="exp-marketcap">Loading...</span></p>
<p>Holders: <span id="exp-holders">Loading...</span></p>
<div id="transactions">Recent transactions coming soon...</div>
</section>

<footer>
<p>© 2026 Olivium Project</p>
</footer>

<script src="js/web3.js"></script>
<script>
async function loadExplorer() {
    try {
        const res = await fetch(`https://api.dexscreener.com/latest/dex/tokens/${CONTRACT}`);
        const data = await res.json();
        document.getElementById("exp-price").innerText = "$"+parseFloat(data.pairs[0].priceUsd).toFixed(4);
        document.getElementById("exp-marketcap").innerText = "$"+(parseFloat(data.pairs[0].priceUsd)*TOTAL_SUPPLY).toFixed(0);
        document.getElementById("exp-holders").innerText = data.pairs[0].holders || "N/A";
        document.getElementById("transactions").innerText = "Transactions feature coming soon!";
    } catch(e) {
        console.log(e);
    }
}
loadExplorer();
</script>

</body>
</html>
