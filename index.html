<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Olivium (OLV)</title>
<style>
/* Reset básico */
* {margin:0; padding:0; box-sizing:border-box;}
body {
  font-family:'Poppins',sans-serif;
  background: linear-gradient(135deg,#0b0f1a,#131b2b);
  color:#fff;
  overflow-x:hidden;
  position:relative;
}
/* Fundo animado */
#bg-canvas {
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  z-index:-1;
}
/* Header */
header{
  display:flex; justify-content:space-between; padding:20px 50px;
  background: rgba(15,23,42,0.95);
}
.logo {font-size:28px; font-weight:bold; color:#00ffa3; text-shadow:0 0 10px #00ffa3;}
nav a {color:#fff; margin-left:20px; text-decoration:none; font-weight:500;}
nav a:hover {color:#00ffa3;}
/* Hero */
.hero {text-align:center; padding:100px 20px;}
.hero h1 {font-size:60px; color:#00ffa3; text-shadow:0 0 15px #00ffa3;}
.hero p {font-size:20px; margin:20px 0;}
.btn {
  background: linear-gradient(45deg,#00ffa3,#00d1ff);
  border:none; border-radius:10px;
  padding:15px 30px; cursor:pointer;
  font-weight:bold; color:black;
  box-shadow:0 0 10px #00ffa3;
  transition: all 0.3s ease;
}
.btn:hover {transform:scale(1.1); box-shadow:0 0 20px #00ffa3;}
/* Cards */
.cards {
  display:flex; justify-content:center; gap:30px; flex-wrap:wrap; margin:40px 0;
}
.card {
  background:rgba(17,24,39,0.8); padding:30px; border-radius:15px;
  text-align:center; min-width:180px;
  box-shadow:0 5px 20px rgba(0,255,163,0.3);
  transition: transform 0.3s, box-shadow 0.3s;
}
.card:hover {transform:translateY(-5px); box-shadow:0 8px 30px rgba(0,255,163,0.5);}
footer {text-align:center; padding:30px; background:rgba(15,23,42,0.95); margin-top:50px;}
@media(max-width:768px){
  .cards{flex-direction:column; align-items:center;}
  .hero h1{font-size:40px;}
}
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<header>
  <div class="logo">OLIVIUM</div>
  <nav>
    <a href="#about">Sobre</a>
    <a href="#buy">Comprar</a>
    <a href="#contact">Contato</a>
  </nav>
</header>

<section class="hero">
  <h1>Olivium (OLV)</h1>
  <p>Ativo digital escasso na rede Polygon</p>
  <button class="btn" onclick="connectWallet()">Conectar Carteira</button>
  <button class="btn" onclick="addToken()">Adicionar OLV</button>
  <a href="https://quickswap.exchange/#/swap?outputCurrency=0xd08d000f1ac5d77274dde5cc146664793f990733" target="_blank">
    <button class="btn">Comprar na QuickSwap</button>
  </a>
</section>

<section class="about" id="about">
  <h2>Informações do Token</h2>
  <div class="cards">
    <div class="card"><h3>Fornecimento total</h3><p>10.000 OLV</p></div>
    <div class="card"><h3>Rede</h3><p>Polygon</p></div>
    <div class="card"><h3>Contrato</h3><p>0xd08d000f1ac5d77274dde5cc146664793f990733</p></div>
  </div>
</section>

<footer id="contact">
  <p>© 2026 Projeto Olivium</p>
</footer>

<script>
// Fundo animado partículas
const canvas=document.getElementById('bg-canvas');
const ctx=canvas.getContext('2d');
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
const particles=[];
for(let i=0;i<100;i++){
  particles.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*2+1,dx:(Math.random()-0.5)*0.5,dy:(Math.random()-0.5)*0.5});
}
function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  particles.forEach(p=>{
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle='rgba(0,255,163,0.7)';
    ctx.fill();
    p.x+=p.dx; p.y+=p.dy;
    if(p.x>canvas.width)p.x=0;if(p.x<0)p.x=canvas.width;
    if(p.y>canvas.height)p.y=0;if(p.y<0)p.y=canvas.height;
  });
  requestAnimationFrame(animate);
}
animate();
window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight;});

// Conectar wallet e adicionar token
const CONTRACT="0xd08d000f1ac5d77274dde5cc146664793f990733";
const DECIMALS=18;
async function connectWallet(){
  if(window.ethereum){await ethereum.request({method:'eth_requestAccounts'}); alert("Carteira Conectada!");}
  else alert("Instale MetaMask!");
}
async function addToken(){
  try{
    await ethereum.request({method:'wallet_watchAsset',params:{type:'ERC20',options:{address:CONTRACT,symbol:'OLV',decimals:DECIMALS}}});
  }catch(e){console.log(e);}
}
</script>

</body>
</html>
